# Render.com blueprint for the Menoxis email backend.
# In Render: New + → Blueprint → point at this repo. Then fill in the
# SMTP_* values (and CORS_ORIGIN = your live site URL) in the dashboard.
services:
  - type: web
    name: menoxis-email
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_TO
        sync: false
      - key: MAIL_FROM
        sync: false
